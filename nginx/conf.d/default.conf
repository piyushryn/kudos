# Reverse proxy for kudos.piyusharyan.xyz (HTTP).
# For HTTPS + Slack production URLs, see ../README.md and default-ssl.conf.example.

# WebSocket / HMR: only send Connection: upgrade when the client asked for it.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream kudos_api {
    server server:4000;
    keepalive 16;
}

upstream kudos_web {
    server dashboard:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name kudos.piyusharyan.xyz localhost;

    client_max_body_size 1m;

    # Let's Encrypt HTTP-01 challenge (free certs via Certbot — see nginx/README.md)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # API (Express)
    location ^~ /slack/ {
        proxy_pass http://kudos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://kudos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api/ {
        proxy_pass http://kudos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Do not proxy /admin to Express — Next.js serves /admin (UI + login). API /admin/* is
    # reached from the dashboard container via DASHBOARD_API_BASE_URL only.

    # Next.js (/, /admin, /leaderboard, /users/..., /_next/*, etc.)
    location / {
        proxy_pass http://kudos_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}
