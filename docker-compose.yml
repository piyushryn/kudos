services:
  mongo:
    image: mongo:8
    container_name: kudos-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-kudos}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-kudos}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_configdb:/data/configdb
      - ./scripts/mongo-entrypoint.sh:/usr/local/bin/mongo-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/mongo-entrypoint.sh"]
    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--keyFile",
        "/data/configdb/mongo-keyfile",
        "--bind_ip_all",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://${MONGO_ROOT_USERNAME:-kudos}:${MONGO_ROOT_PASSWORD:-kudos}@localhost:27017/admin?directConnection=true --quiet",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo-init:
    image: mongo:8
    container_name: kudos-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-kudos}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-kudos}
    volumes:
      - ./scripts/mongo-init-replset.sh:/usr/local/bin/mongo-init-replset.sh:ro
    entrypoint: ["/usr/local/bin/mongo-init-replset.sh"]
    restart: "no"

  server:
    build:
      context: ./server
    container_name: kudos-server
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: "mongodb://${MONGO_ROOT_USERNAME:-kudos}:${MONGO_ROOT_PASSWORD:-kudos}@mongo:27017/kudos?authSource=admin&replicaSet=rs0"
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      DEFAULT_MONTHLY_BALANCE: ${DEFAULT_MONTHLY_BALANCE:-100}
      MAX_KUDOS_PER_TRANSACTION: ${MAX_KUDOS_PER_TRANSACTION:-50}
      ENABLE_DAILY_RECEIVER_CAP: ${ENABLE_DAILY_RECEIVER_CAP:-false}
      DAILY_RECEIVER_CAP: ${DAILY_RECEIVER_CAP:-100}
      CRON_MONTHLY_RESET: ${CRON_MONTHLY_RESET:-0 2 1 * *}
      ENABLE_MANUAL_MONTHLY_RESET: ${ENABLE_MANUAL_MONTHLY_RESET:-false}
      SUPER_ADMIN_SLACK_USER_IDS: ${SUPER_ADMIN_SLACK_USER_IDS}
      USER_SESSION_SIGNING_SECRET: ${USER_SESSION_SIGNING_SECRET}
      SLACK_VERBOSE_LOGGING: ${SLACK_VERBOSE_LOGGING:-true}
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: ./dashboard
    container_name: kudos-dashboard
    depends_on:
      - server
    # Project-root .env (optional); explicit keys below still win.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DASHBOARD_API_BASE_URL: http://server:4000
      SUPER_ADMIN_SLACK_USER_IDS: ${SUPER_ADMIN_SLACK_USER_IDS}
      USER_SESSION_SIGNING_SECRET: ${USER_SESSION_SIGNING_SECRET}
      SLACK_OIDC_CLIENT_ID: ${SLACK_OIDC_CLIENT_ID}
      SLACK_OIDC_CLIENT_SECRET: ${SLACK_OIDC_CLIENT_SECRET}
      SLACK_OIDC_REDIRECT_URI: ${SLACK_OIDC_REDIRECT_URI}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: kudos-nginx
    depends_on:
      - server
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt webroot + issued certs (free TLS — see certbot/README.md)
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

volumes:
  mongo_data:
  mongo_configdb:
