services:
  postgres:
    image: postgres:16-alpine
    container_name: kudos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kudos}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ./server
    container_name: kudos-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-kudos}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      DEFAULT_MONTHLY_BALANCE: ${DEFAULT_MONTHLY_BALANCE:-100}
      MAX_KUDOS_PER_TRANSACTION: ${MAX_KUDOS_PER_TRANSACTION:-50}
      ENABLE_DAILY_RECEIVER_CAP: ${ENABLE_DAILY_RECEIVER_CAP:-false}
      DAILY_RECEIVER_CAP: ${DAILY_RECEIVER_CAP:-100}
      CRON_MONTHLY_RESET: ${CRON_MONTHLY_RESET:-0 2 1 * *}
      ENABLE_MANUAL_MONTHLY_RESET: ${ENABLE_MANUAL_MONTHLY_RESET:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      DASHBOARD_SERVICE_TOKEN: ${DASHBOARD_SERVICE_TOKEN}
      USER_SESSION_SIGNING_SECRET: ${USER_SESSION_SIGNING_SECRET}
    command: ["sh", "-c", "npx prisma migrate deploy"]

  server:
    build:
      context: ./server
    container_name: kudos-server
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-kudos}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      DEFAULT_MONTHLY_BALANCE: ${DEFAULT_MONTHLY_BALANCE:-100}
      MAX_KUDOS_PER_TRANSACTION: ${MAX_KUDOS_PER_TRANSACTION:-50}
      ENABLE_DAILY_RECEIVER_CAP: ${ENABLE_DAILY_RECEIVER_CAP:-false}
      DAILY_RECEIVER_CAP: ${DAILY_RECEIVER_CAP:-100}
      CRON_MONTHLY_RESET: ${CRON_MONTHLY_RESET:-0 2 1 * *}
      ENABLE_MANUAL_MONTHLY_RESET: ${ENABLE_MANUAL_MONTHLY_RESET:-false}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      DASHBOARD_SERVICE_TOKEN: ${DASHBOARD_SERVICE_TOKEN}
      USER_SESSION_SIGNING_SECRET: ${USER_SESSION_SIGNING_SECRET}
      SLACK_VERBOSE_LOGGING: ${SLACK_VERBOSE_LOGGING:-true}
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: ./dashboard
    container_name: kudos-dashboard
    depends_on:
      - server
    # Project-root .env (optional); explicit keys below still win.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DASHBOARD_API_BASE_URL: http://server:4000
      DASHBOARD_SERVICE_TOKEN: ${DASHBOARD_SERVICE_TOKEN}
      USER_SESSION_SIGNING_SECRET: ${USER_SESSION_SIGNING_SECRET}
      ADMIN_SESSION_SIGNING_SECRET: ${ADMIN_SESSION_SIGNING_SECRET}
      DASHBOARD_ADMIN_SLACK_USER_IDS: ${DASHBOARD_ADMIN_SLACK_USER_IDS}
      SLACK_OIDC_CLIENT_ID: ${SLACK_OIDC_CLIENT_ID}
      SLACK_OIDC_CLIENT_SECRET: ${SLACK_OIDC_CLIENT_SECRET}
      SLACK_OIDC_REDIRECT_URI: ${SLACK_OIDC_REDIRECT_URI}
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: kudos-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@kudos.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 30
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  nginx:
    image: nginx:1.27-alpine
    container_name: kudos-nginx
    depends_on:
      - server
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt webroot + issued certs (free TLS — see certbot/README.md)
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

volumes:
  postgres_data:
  pgadmin_data:
